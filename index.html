<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #1d1d1f;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6e6e73;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #0071e3;
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #f0f8ff;
            border-left: 4px solid #0071e3;
            border-radius: 4px;
        }

        .result-title {
            font-size: 0.9rem;
            color: #0071e3;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .error {
            color: #ff3b30;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .graph-container {
            position: relative;
            width: 100%;
            height: 450px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid #e5e5ea;
            padding: 10px;
            box-sizing: border-box;
        }

        .instructions {
            font-size: 0.8rem;
            color: #86868b;
            line-height: 1.4;
        }
    </style>
</head>
<body>
